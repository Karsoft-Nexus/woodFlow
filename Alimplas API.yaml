components:
  schemas:
    AdminCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        role:
          allOf:
          - $ref: '#/components/schemas/Role'
          readOnly: true
        role_id:
          type: integer
          writeOnly: true
        phone:
          type: string
          maxLength: 15
        password:
          type: string
          writeOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
          title: Oxirgi kirish
      required:
      - created_at
      - first_name
      - id
      - last_name
      - password
      - phone
      - role
      - role_id
      - updated_at
    AdminGetMe:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        full_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/Role'
          readOnly: true
        phone:
          type: string
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Oxirgi kirish
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - first_name
      - full_name
      - id
      - is_staff
      - is_superuser
      - last_login
      - last_name
      - phone
      - role
    BOM:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        material_name:
          type: string
          readOnly: true
        required_qty:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
          title: Required Quantity
        actual_allocated_qty:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
        order:
          type: integer
        material:
          type: integer
      required:
      - id
      - material
      - material_name
      - order
      - required_qty
    CategoryEnum:
      enum:
      - CUSTOMER_PAYMENT
      - MATERIAL_BUY
      - SALARY
      - RENT
      - UTILITIES
      - OTHER
      type: string
      description: |-
        * `CUSTOMER_PAYMENT` - Mijoz to'lovi
        * `MATERIAL_BUY` - Xomashyo xaridi
        * `SALARY` - Ish haqi
        * `RENT` - Arenda
        * `UTILITIES` - Kommunal to'lovlar
        * `OTHER` - Boshqa
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Customer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
        phone:
          type: string
          title: Phone Number
          maxLength: 20
        address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - first_name
      - id
      - phone
    Finance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tx_type:
          $ref: '#/components/schemas/FinanceTxTypeEnum'
        category:
          $ref: '#/components/schemas/CategoryEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        order:
          type: integer
          nullable: true
      required:
      - amount
      - category
      - created_at
      - id
      - tx_type
    FinanceTxTypeEnum:
      enum:
      - INCOME
      - EXPENSE
      type: string
      description: |-
        * `INCOME` - Kirim
        * `EXPENSE` - Chiqim
    Login:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - id
      - password
      - phone
    Material:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
        category_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        unit:
          type: integer
        unit_code:
          type: string
          readOnly: true
        is_sheet:
          type: boolean
          title: Is Sheet/Board
        length:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
          nullable: true
          title: Length (m)
        width:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
          nullable: true
          title: Width (m)
        thickness:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          title: Thickness (mm)
        area_m2:
          type: string
          readOnly: true
        barcode:
          type: string
          nullable: true
          maxLength: 100
        min_threshold:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          title: Minimum Threshold
        average_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        total_stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,4})?$
          readOnly: true
        available_stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,4})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - area_m2
      - available_stock
      - average_price
      - category
      - category_name
      - created_at
      - id
      - name
      - total_stock
      - unit
      - unit_code
      - updated_at
    MaterialCategory:
